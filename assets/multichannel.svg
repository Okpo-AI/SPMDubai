<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="goldBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d69e2e"/><stop offset="100%" stop-color="#ecc94b"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38a169"/><stop offset="100%" stop-color="#68d391"/>
    </linearGradient>
    <filter id="cardShadowM" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#2d3748" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Card bg -->
  <rect width="400" height="280" rx="16" fill="#ffffff" filter="url(#cardShadowM)"/>

  <!-- Icon badge -->
  <rect x="28" y="20" width="32" height="32" rx="10" fill="#e8f6ef"/>
  <text x="44" y="42" text-anchor="middle" font-size="15" fill="#38a169" font-family="system-ui">&#x25CF;</text>

  <!-- Title row -->
  <text x="70" y="34" font-size="13" fill="#2d3748" font-family="system-ui" font-weight="700">Channel Performance</text>
  <text x="332" y="34" font-size="9" fill="#a0aec0" font-family="system-ui" text-anchor="end">Year</text>
  <text x="370" y="34" font-size="9" fill="#a0aec0" font-family="system-ui" text-anchor="end">&#x25BE;</text>

  <!-- Gold bar chart (like "Spendings statistic") -->
  <line x1="28" y1="200" x2="372" y2="200" stroke="#edf2f7" stroke-width="1"/>

  <!-- Bar pairs (actual + lighter) -->
  <rect x="42" y="130" width="16" height="70" rx="4" fill="url(#goldBar)"/>
  <rect x="62" y="150" width="16" height="50" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <rect x="100" y="110" width="16" height="90" rx="4" fill="url(#goldBar)"/>
  <rect x="120" y="140" width="16" height="60" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <rect x="158" y="125" width="16" height="75" rx="4" fill="url(#goldBar)"/>
  <rect x="178" y="148" width="16" height="52" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <rect x="216" y="100" width="16" height="100" rx="4" fill="url(#goldBar)"/>
  <rect x="236" y="135" width="16" height="65" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <rect x="274" y="90" width="16" height="110" rx="4" fill="url(#goldBar)"/>
  <rect x="294" y="120" width="16" height="80" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <rect x="332" y="80" width="16" height="120" rx="4" fill="url(#goldBar)"/>
  <rect x="352" y="108" width="16" height="92" rx="4" fill="url(#goldBar)" opacity="0.4"/>

  <!-- X-axis labels -->
  <text x="55" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">Voice</text>
  <text x="113" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">SMS</text>
  <text x="171" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">Email</text>
  <text x="229" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">WhatsApp</text>
  <text x="287" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">AR</text>
  <text x="345" y="216" text-anchor="middle" font-size="8" fill="#a0aec0" font-family="system-ui">EN</text>

  <!-- Bottom stats row -->
  <text x="28" y="248" font-size="24" fill="#2d3748" font-family="system-ui" font-weight="800">6,570</text>
  <text x="28" y="266" font-size="10" fill="#a0aec0" font-family="system-ui">Total Interactions</text>

  <!-- Mini stat pills -->
  <rect x="178" y="238" width="56" height="22" rx="11" fill="#e8f6ef"/>
  <text x="206" y="253" text-anchor="middle" font-size="9" fill="#38a169" font-family="system-ui" font-weight="600">+14% &#x2191;</text>

  <!-- Channel quick stats -->
  <text x="260" y="248" font-size="9" fill="#a0aec0" font-family="system-ui">Voice 2,450</text>
  <text x="260" y="264" font-size="9" fill="#a0aec0" font-family="system-ui">SMS 1,820</text>
  <text x="336" y="248" font-size="9" fill="#a0aec0" font-family="system-ui">Email 960</text>
  <text x="336" y="264" font-size="9" fill="#a0aec0" font-family="system-ui">WA 1,340</text>
</svg>