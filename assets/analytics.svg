<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="greenArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38a169" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38a169" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d69e2e"/><stop offset="100%" stop-color="#ecc94b"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#2d3748" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Card bg -->
  <rect width="400" height="280" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Icon badge -->
  <rect x="28" y="20" width="32" height="32" rx="10" fill="#e8f6ef"/>
  <text x="44" y="41" text-anchor="middle" font-size="14" fill="#38a169" font-family="system-ui">&#x25B2;</text>

  <!-- Title -->
  <text x="70" y="34" font-size="13" fill="#2d3748" font-family="system-ui" font-weight="700">Recovery Overview</text>
  <text x="70" y="48" font-size="9" fill="#a0aec0" font-family="system-ui">AI-powered debtor scoring</text>

  <!-- Green area chart -->
  <polygon points="28,185 60,178 92,174 124,180 156,168 188,160 220,166 252,152 284,146 316,150 348,138 372,130 372,185" fill="url(#greenArea)"/>
  <polyline points="28,185 60,178 92,174 124,180 156,168 188,160 220,166 252,152 284,146 316,150 348,138 372,130" stroke="#38a169" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="372" cy="130" r="4" fill="#38a169"/>
  <circle cx="372" cy="130" r="7" fill="#38a169" opacity="0.15"/>

  <!-- KPI numbers -->
  <text x="28" y="226" font-size="28" fill="#2d3748" font-family="system-ui" font-weight="800">3K+</text>
  <text x="28" y="244" font-size="10" fill="#a0aec0" font-family="system-ui">Accounts Managed</text>

  <!-- Recovery stat -->
  <text x="160" y="226" font-size="28" fill="#2d3748" font-family="system-ui" font-weight="800">85%</text>
  <text x="160" y="244" font-size="10" fill="#a0aec0" font-family="system-ui">Recovery Rate</text>

  <!-- Green pill -->
  <rect x="290" y="218" width="80" height="28" rx="14" fill="#e8f6ef"/>
  <text x="330" y="237" text-anchor="middle" font-size="11" fill="#38a169" font-family="system-ui" font-weight="600">+18% &#x2191;</text>

  <!-- Subtitle line (x-axis labels) -->
  <text x="28" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">Mar</text>
  <text x="92" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">Apr</text>
  <text x="156" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">May</text>
  <text x="220" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">Jun</text>
  <text x="284" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">Jul</text>
  <text x="348" y="268" font-size="8" fill="#cbd5e0" font-family="system-ui">Aug</text>
</svg>
</svg>